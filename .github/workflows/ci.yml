name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  PLAIN_DICTIONARY_UPDATE_MANIFEST_URL: https://github.com/Areson-LTQ/plain-dictionary/releases/download/dictionary-latest/dictionary-manifest.json
  PLAIN_DICTIONARY_UPDATE_PUBLIC_KEY: f9auhCzb1iknc1nMRUZMo9TSWHoC6CMJOsIod6IJN5Q=

jobs:
  test:
    name: ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-15, windows-2022]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Use preinstalled Rust toolchain
        shell: bash
        run: |
          rustc --version
          cargo --version
          if ! cargo fmt --version; then
            for attempt in 1 2 3; do
              rustup component add rustfmt && break
              sleep $((attempt * 15))
            done
          fi
          cargo fmt --version

      - name: Install frontend dependencies
        run: npm ci

      - name: Test dictionary parser and frontend
        run: npm test

      - name: Build frontend
        run: npm run build

      - name: Check Rust formatting
        run: cargo fmt --manifest-path src-tauri/Cargo.toml --check

      - name: Test Rust backend
        run: cargo test --manifest-path src-tauri/Cargo.toml

      - name: Compile Tauri application
        run: npm run tauri build -- --debug --no-bundle
